name: Build Scramjet for Raspberry Pi 5

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
      contents: read

    steps:
      # 1. Get the latest commit hash from upstream
      - name: Get Latest Upstream Commit
        id: get_commit
        run: |
          # Use git ls-remote to completely bypass GitHub REST API rate limits
          LATEST_SHA=$(git ls-remote https://github.com/MercuryWorkshop/scramjet.git refs/heads/main | awk '{print $1}')
          
          if [ -z "$LATEST_SHA" ]; then
            echo "Failed to fetch commit from GitHub. Exiting."
            exit 1
          fi
          
          SHORT_SHA=${LATEST_SHA:0:7}
          echo "latest_sha=$LATEST_SHA" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Upstream latest commit: $SHORT_SHA"

      # 2. Login to GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Skip if already built
      - name: Check if we already built this version
        id: check_build
        run: |
          if docker manifest inspect ghcr.io/${{ github.repository_owner }}/scramjet:${{ steps.get_commit.outputs.short_sha }} > /dev/null 2>&1; then
            echo "Commit ${{ steps.get_commit.outputs.short_sha }} already built. Skipping."
            echo "build_needed=false" >> $GITHUB_OUTPUT
          else
            echo "Commit ${{ steps.get_commit.outputs.short_sha }} is new. Building."
            echo "build_needed=true" >> $GITHUB_OUTPUT
          fi

      # 4. Checkout our repo (for Dockerfile + server.prod.mjs)
      - name: Checkout our build repo
        if: steps.check_build.outputs.build_needed == 'true'
        uses: actions/checkout@v4

      # 5. Clone upstream scramjet into the build context
      - name: Clone upstream scramjet
        if: steps.check_build.outputs.build_needed == 'true'
        run: |
          git clone --recursive --depth 1 https://github.com/MercuryWorkshop/scramjet.git scramjet-src
          # Copy our Dockerfile and production server into the source tree
          cp Dockerfile scramjet-src/
          cp server.prod.mjs scramjet-src/

      # 6. Set up Docker Buildx
      - name: Set up Docker Buildx
        if: steps.check_build.outputs.build_needed == 'true'
        uses: docker/setup-buildx-action@v3

      # 7. Build and Push
      - name: Build and Push Docker Image
        if: steps.check_build.outputs.build_needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./scramjet-src
          file: ./scramjet-src/Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            VITE_WISP_URL=${{ secrets.VITE_WISP_URL }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/scramjet:latest
            ghcr.io/${{ github.repository_owner }}/scramjet:${{ steps.get_commit.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
